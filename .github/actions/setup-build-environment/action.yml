name: Setup Build Environment
runs:
  using: "composite"
  steps:

    - name: Init Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.platformio/.cache
        key: ${{ runner.os }}-pio

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      shell: bash
      run: |
        pip install --upgrade platformio

    # Tags like companion-v1.14.0.35 must yield FIRMWARE_VERSION=v1.14.0.35 (not just the last segment).
    - name: Extract Version from Git Tag
      shell: bash
      run: |
        GIT_TAG_NAME="${GITHUB_REF#refs/tags/}"
        case "$GIT_TAG_NAME" in
          companion-*)    GIT_TAG_VERSION="${GIT_TAG_NAME#companion-}" ;;
          repeater-*)     GIT_TAG_VERSION="${GIT_TAG_NAME#repeater-}" ;;
          room-server-*)  GIT_TAG_VERSION="${GIT_TAG_NAME#room-server-}" ;;
          *)              GIT_TAG_VERSION="${GIT_TAG_NAME##*-}" ;;
        esac
        echo "GIT_TAG_VERSION=$GIT_TAG_VERSION" >> "$GITHUB_ENV"
